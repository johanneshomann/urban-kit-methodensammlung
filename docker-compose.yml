services:
  app:
    build: .
    ports:
      - "3040:3000"
    env_file: .env
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - media_data:/app/public/media
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/admin', r => process.exit(r.statusCode >= 500 ? 1 : 0)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  seed:
    build: .
    command: npx tsx seed.ts
    env_file: .env
    depends_on:
      app:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: "no"

  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: urban-kit
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongodb_data:
  media_data:
